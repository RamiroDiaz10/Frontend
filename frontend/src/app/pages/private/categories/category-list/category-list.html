

<div class="container">
  <div class="header-section">
    <h2>Categories Management</h2>
    <button class="btn-add" routerLink="/dashboard/category/new"> + New Category</button>
  </div>

  <div class="table-responsive">
    <table class="custom-table">
      <thead>
        <tr>
          <th>Name Category</th>
          <th>Descripción</th>
          <th>Image</th>
          <th>Stock</th>
          <th>IsActive</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (category of (categories | async); track $index) {
            <tr>
              <td>{{category.name}}</td>
              <td>{{category.description}}</td>
              <td>
                <img [src]="category.image" [alt]="category.name" width="50">
              </td>
              <td>{{category.stock}}</td>
              <td>{{category.isActive ? 'Sí' : 'No'}}</td>
              <td class="actions">
                <button class="btn-edit" title="Edit" (click)="onEdit(category._id!)">
                  <i class="icon-edit"></i> Update
                </button>
                <button class="btn-delete" title="Delete" (click)="deleteCategory(category._id!)">
                  <i class="icon-trash"></i> Delete
                </button>
              </td>
            </tr>

        }
        </tbody>
    </table>
  </div>
</div>
