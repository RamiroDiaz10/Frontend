<div class="form-container">
  <h2>Editar Usuario</h2>

  <div *ngIf="loading && !userId" class="loading-state">Cargando...</div>

  <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
  <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

  <form *ngIf="!loading || userId" [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Nombre</label>
      <input id="name" type="text" formControlName="name" class="form-control" placeholder="Nombre completo">
      <div *ngIf="userForm.get('name')?.invalid && userForm.get('name')?.touched" class="error-text">
        El nombre es obligatorio.
      </div>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" class="form-control" placeholder="Nombre de usuario">
      <div *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched" class="error-text">
        El username es obligatorio.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Correo</label>
      <input id="email" type="email" formControlName="email" class="form-control" placeholder="Correo electrónico">
      <div *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched" class="error-text">
        Ingrese un correo electrónico válido.
      </div>
    </div>

    <div class="form-group">
      <label for="role">Rol</label>
      <select id="role" formControlName="role" class="form-control">
        <option value="USER_ROLE">Usuario</option>
        <option value="ADMIN_ROLE">Administrador</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="loading || userForm.invalid" class="btn btn-primary">
        {{ loading ? 'Actualizando...' : 'Actualizar Usuario' }}
      </button>
      <a routerLink="/dashboard/users-list" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
