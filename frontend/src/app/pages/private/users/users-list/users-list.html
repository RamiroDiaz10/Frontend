

<div class="container">
  <div class="header-section">
    <h2>Users Management</h2>
    
    <button class="btn-add" routerLink="/dashboard/user/new"> + New User</button>
    
  </div>

  <div class="table-responsive">
    <table class="custom-table">
      <thead>
        <tr>
          <th>Name User</th>
          <th>Username</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Role</th>
          <th>IsActive</th>
          <th>CreateDate</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (user of (users$ | async); track $index) {
            <tr>
              <td>{{user.name}}</td>
              <td>{{user.username}}</td>
              <td>{{user.phone}}</td>
              <td>{{user.email}}</td>
              <td>{{user.role}}</td>
              <td>{{user.isActive ? 'Sí' : 'No'}}</td>
              <td>{{user.createDate}}</td>
              <td class="actions">
                
                  <button class="btn-edit" title="Edit" (click)="onEdit(user._id!)">
                    <i class="icon-edit"></i> Update
                  </button>
                
                <button class="btn-delete" title="Delete" (click)="deleteUser(user._id!)">
                  <i class="icon-trash"></i> Delete
                </button>
              </td>
            </tr>

        }
        </tbody>
    </table>
  </div>
</div>
