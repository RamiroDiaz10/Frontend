<div class="list-container">
  <div class="list-header">
    <h2>Lista de Usuarios</h2>
    <a routerLink="/dashboard/users-new" class="btn btn-primary">Crear Nuevo Usuario</a>
  </div>

  <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

  <div *ngIf="loading" class="loading-state">
    <p>Cargando usuarios...</p>
  </div>

  <div *ngIf="!loading && users.length === 0" class="empty-state">
    <p>No hay usuarios registrados.</p>
  </div>

  <div class="table-responsive-wrapper">
    <table *ngIf="!loading && users.length > 0" class="table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Username</th>
          <th>Correo</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.name }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.role }}</td>
          <td class="table-actions">
            <a [routerLink]="['/dashboard/users-edit', user._id]" class="btn-sm btn-info">Editar</a>
            <button (click)="deleteUser(user._id)" class="btn-sm btn-danger">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
