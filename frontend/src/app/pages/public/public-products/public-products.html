 <section class="container-cards">
    <div class="container"> 
        <div class="tittle">
            <h1>Todas nuestras muñecas KMG</h1>
        </div>
    <div class="card-munecos">
      @for( product of (products | async); track $index){
        <article class="card-muneco">
          <div class="card-image-box">
            <img [src]="product.image" [alt]="product.name" />
            <button class="add-to-cart-slide" (click)="addToCart(product)"><i class="fa-solid fa-bag-shopping"></i> Añadir al carrito</button>
          </div>
          <div class="card-muneco-info">
            <p class="stock-text">En stock {{ product.stock }}</p>
            <h3 class="product-title">{{ product.name }}</h3>
             <p><span class="current-price">Rs. {{ product.price | currency:'COP':'symbol-narrow':'1.0-0'  }}</span></p> <!--<span class="previous-price">Rs. {{ product.size| currency }}</span> -->
            <p class="desc-text">{{ product.description }}</p>
          </div>
        </article>
      }
       
    </div>
    </div>
    
  </section>
